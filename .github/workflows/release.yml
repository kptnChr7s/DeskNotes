name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish portable build
        run: dotnet publish DeskNotes.csproj -c Release -r win-x64 --self-contained true -o publish/portable

      - name: Create ZIP
        run: Compress-Archive -Path publish/portable/* -DestinationPath DeskNotes-${{ github.ref_name }}-win-x64.zip -Force
        shell: pwsh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: DeskNotes-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true